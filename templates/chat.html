<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Термин Бот</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-window {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message { margin-bottom: 15px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            white-space: pre-wrap;
        }
        .user .bubble { background: #2a5298; color: white; }
        .bot .bubble { background: white; border: 1px solid #ddd; }
        .buttons-panel {
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: #2a5298;
            color: white;
        }
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
        }
        .input-area button {
            padding: 12px 25px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-window">
        <div class="header">
            <h1>🤖 AI Термин Бот</h1>
            <p>Изучайте профессиональные термины</p>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">
                <div class="bubble">👋 Привет! Я помогу тебе изучить профессиональные термины!</div>
            </div>
        </div>
        <div class="buttons-panel" id="buttonsPanel">
            <button class="btn" onclick="sendAction('start')">🚀 Start</button>
            <button class="btn" onclick="sendAction('learn')">📚 Learn</button>
            <button class="btn" onclick="sendAction('ai_menu')">🤖 Explain AI</button>
            <button class="btn" onclick="sendAction('exit')">🚪 Exit</button>
        </div>
        <div class="input-area" id="inputArea" style="display: none;">
            <input type="text" id="messageInput" placeholder="Введите сообщение...">
            <button onclick="sendMessage()">📤 Отправить</button>
        </div>
    </div>
    <script>
        let awaitingInput = false, awaitingType = null;
        function addMessage(text, isUser) {
            const div = document.getElementById('messages');
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            div.appendChild(msg);
            div.scrollTop = div.scrollHeight;
        }
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, true);
            input.value = '';
            if (awaitingInput && awaitingType === 'term') {
                awaitingInput = false;
                document.getElementById('inputArea').style.display = 'none';
                await sendToBot(text, 'explain_term');
            } else if (awaitingInput && awaitingType === 'question') {
                awaitingInput = false;
                document.getElementById('inputArea').style.display = 'none';
                await sendToBot(text, 'ask_ai');
            }
        }
        async function sendAction(action, extra) {
            await sendToBot('', action, extra);
        }
        async function sendToBot(msg, action, extra) {
            try {
                const loading = document.createElement('div');
                loading.className = 'message bot';
                loading.innerHTML = '<div class="bubble">🤔 Думаю...</div>';
                document.getElementById('messages').appendChild(loading);
                const res = await fetch('/api/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, action: action, ...extra })
                });
                loading.remove();
                const data = await res.json();
                if (data.response) addMessage(data.response);
                if (data.question) showQuiz(data.question);
                else if (data.next_question) showQuiz(data.next_question);
                else if (data.awaiting) {
                    awaitingInput = true;
                    awaitingType = data.awaiting;
                    const area = document.getElementById('inputArea');
                    document.getElementById('messageInput').placeholder = data.awaiting === 'term' ? '📝 Введите термин...' : '💭 Введите вопрос...';
                    area.style.display = 'flex';
                } else if (data.menu) loadMenu(data.menu);
            } catch(e) { addMessage('❌ Ошибка'); }
        }
        function showQuiz(q) {
            const panel = document.getElementById('buttonsPanel');
            panel.innerHTML = '';
            addMessage(`❓ ${q.prof} - это...?`);
            q.variants.forEach(v => {
                const btn = document.createElement('button');
                btn.textContent = v;
                btn.className = 'btn';
                btn.onclick = () => sendToBot('', 'answer', { answer: v });
                panel.appendChild(btn);
            });
            const back = document.createElement('button');
            back.textContent = '🔙 Главное меню';
            back.className = 'btn';
            back.onclick = () => sendToBot('', 'back');
            panel.appendChild(back);
        }
        function loadMenu(t) {
            const panel = document.getElementById('buttonsPanel');
            panel.innerHTML = '';
            if (t === 'main') {
                createBtn('🚀 Start', 'start');
                createBtn('📚 Learn', 'learn');
                createBtn('🤖 Explain AI', 'ai_menu');
                createBtn('🚪 Exit', 'exit');
            } else if (t === 'learn') {
                createBtn('💻 Программирование', 'topic', { topic: 'programming' });
                createBtn('🗄️ Базы данных', 'topic', { topic: 'db_admin' });
                createBtn('🇬🇧 Английский', 'topic', { topic: 'english' });
                createBtn('🔙 Назад', 'back');
            } else if (t === 'ai') {
                createBtn('📖 Объяснить термин', 'explain_term');
                createBtn('💬 Спросить AI', 'ask_ai');
                createBtn('🔙 Назад', 'back');
            }
        }
        function createBtn(text, action, extra) {
            const btn = document.createElement('button');
            btn.textContent = text;
            btn.className = 'btn';
            btn.onclick = () => sendToBot('', action, extra);
            document.getElementById('buttonsPanel').appendChild(btn);
        }
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
